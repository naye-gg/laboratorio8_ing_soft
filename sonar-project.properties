# El projectKey debe ser IDENTICO al Project key creado en SonarQube.
sonar.projectKey=Nayeli_Guerrero_t1
sonar.projectName=Nayeli_Guerrero_t1

# Codigo fuente analizado
sonar.sources=restaurant_rewards
sonar.exclusions=.venv/**, **/tests/**, **/__pycache__/**

# Servidor SonarQube del curso
sonar.host.url=https://sonarqube.ingsoftware.lat/
# El token NO se versiona (es un secreto). Pasalo al ejecutar el analisis:
#   export SONAR_TOKEN=<tu_token>     &&  sonar-scanner
#   o bien:                               sonar-scanner -Dsonar.token=<tu_token>
# El scanner toma SONAR_TOKEN del entorno automaticamente.

# CONFIGURACION DE PRUEBAS Y COBERTURA
sonar.tests=tests
sonar.test.inclusions=tests/**, **/test_*.py
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.10, 3.11, 3.12, 3.13

# Interfaces puras (Protocol): sin logica ejecutable que cubrir
sonar.coverage.exclusions=**/ports.py
